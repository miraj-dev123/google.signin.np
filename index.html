<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Login</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e; /* Dark game theme */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }
        .login-box {
            background: #16213e;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,255,255,0.2);
            width: 320px;
            text-align: center;
            border: 1px solid #0f3460;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #0f3460;
            border: 1px solid #e94560;
            border-radius: 5px;
            color: white;
            box-sizing: border-box;
        }
        .teleport-btn {
            width: 100%;
            padding: 12px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            margin-top: 10px;
            transition: 0.3s;
        }
        .teleport-btn:hover {
            background: #ff2e63;
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <div class="login-box">
        <form id="loginForm">
            <h2>READY TO PLAY?</h2>
            <input type="text" placeholder="Player Name" required>
            <input type="password" placeholder="Passcode" required>
            
            <button type="submit" class="teleport-btn">ENTER GAME</button>
        </form>
    </div>

    <script>
       <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault(); 
        
        // This is the line that must be correct:
        window.location.href = "https://miraj-dev123.github.io/game/";
    });
</script>

    </script>

</body>
</html>
