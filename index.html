<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login to Play</title>
    <style>
        /* Modern UI Styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 350px;
            text-align: center;
        }

        h2 { color: #333; margin-bottom: 25px; }

        .input-group { text-align: left; margin-bottom: 15px; }

        label { display: block; margin-bottom: 5px; color: #666; font-size: 14px; }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box; /* Prevents input from overflowing */
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #764ba2;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }

        .login-btn:hover { background: #5a377e; }

        .footer-text { margin-top: 20px; font-size: 13px; color: #888; }
        
        a { color: #764ba2; text-decoration: none; }
    </style>
</head>
<body>

    <div class="login-container">
        <form id="loginForm">
            <h2>Game Login</h2>
            
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" required placeholder="Enter username">
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Enter password">
            </div>

            <!-- This button triggers the "Teleport" -->
            <button type="submit" class="login-btn">Login & Play</button>

            <p class="footer-text">
                Want to skip? <a href="https://miraj-dev123.github.io/game/">Click here</a>
            </p>
        </form>
    </div>

    <script>
        // The "Teleport" Script
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Prevents the page from refreshing
            
            // Teleport the user to the game
            window.location.href = "https://miraj-dev123.github.io/game/";
        });
    </script>

</body>
</html>
